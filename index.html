<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Project September V2 — Arise. A Solo Leveling-inspired productivity operating system." />
  <title>Project September V2 — Arise</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/themes.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/animations.css">
<link rel="stylesheet" href="./css/sidebar.css">
<link rel="stylesheet" href="./css/dashboard.css">
<link rel="stylesheet" href="./css/calendar.css">
<link rel="stylesheet" href="./css/profile.css">
</head>
<body>
  <div id="app">
    <canvas id="particles" class="particles-canvas" aria-hidden="true"></canvas>

    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="sidebar__brand no-logo">
        <div class="sidebar__title">
          <span class="sidebar__name">ARISE</span>
          <span class="sidebar__subtitle">S-Rank System</span>
        </div>
      </div>

      <nav class="sidebar__nav" id="sidebarNav" aria-label="Main navigation"></nav>

      <div class="sidebar__footer">
        <div class="sidebar__rank" id="sidebarRank">
          <div class="sidebar__rank-badge" id="sidebarRankBadge">E</div>
          <div class="sidebar__rank-info">
            <span class="sidebar__rank-label">Current Rank</span>
            <span class="sidebar__rank-name" id="sidebarRankName">Novice</span>
          </div>
        </div>
        <button class="sidebar__collapse" id="sidebarCollapse" aria-label="Collapse sidebar" title="Collapse sidebar (Ctrl+B)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18 L9 12 L15 6" />
          </svg>
        </button>
      </div>
    </aside>

    <div class="sidebar__backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <main class="main" id="main">
      <header class="topbar">
        <button class="topbar__menu" id="topbarMenu" aria-label="Open menu">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="topbar__search">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="topbar__search-icon">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="commandSearch" placeholder="Search quests, achievements… (Ctrl+K)" autocomplete="off" />
        </div>
        <div class="topbar__actions">
          <div class="topbar__streak" id="topbarStreak" title="Daily streak">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z" />
            </svg>
            <span id="topbarStreakValue">0</span>
          </div>
          <button class="topbar__icon-btn" id="topbarNotif" aria-label="Notifications" title="Notifications (Ctrl+N)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8 A6 6 0 0 0 6 8 C 6 15 3 17 3 17 H 21 S 18 15 18 8" />
              <path d="M13.73 21 a2 2 0 0 1 -3.46 0" />
            </svg>
            <span class="topbar__badge" id="topbarNotifBadge" hidden>0</span>
          </button>
          <button class="topbar__avatar" id="topbarAvatar" aria-label="Open profile" title="Profile">
            <span id="topbarAvatarText">S</span>
          </button>
        </div>
      </header>

      <div class="view" id="view"></div>
    </main>

    <div class="notifications" id="notifications" aria-live="polite" aria-atomic="false"></div>

    <div class="command-palette" id="commandPalette" hidden>
      <div class="command-palette__backdrop" data-close-palette></div>
      <div class="command-palette__panel" role="dialog" aria-label="Command palette">
        <div class="command-palette__header">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18 V5 l12-2 v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" />
          </svg>
          <input type="text" id="commandInput" placeholder="Type a command or search…" autocomplete="off" />
          <kbd>Esc</kbd>
        </div>
        <div class="command-palette__list" id="commandList"></div>
      </div>
    </div>

    <div class="modal" id="modal" hidden>
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal__close" data-close-modal aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <h2 class="modal__title" id="modalTitle"></h2>
        <div class="modal__body" id="modalBody"></div>
      </div>
    </div>

    <div class="level-up" id="levelUp" hidden>
      <div class="level-up__backdrop" id="levelUpBackdrop"></div>
      <div class="level-up__burst"></div>
      <div class="level-up__content">
        <button class="level-up__close" id="levelUpClose" aria-label="Dismiss">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <div class="level-up__label">LEVEL UP</div>
        <div class="level-up__level" id="levelUpLevel">2</div>
        <div class="level-up__rank" id="levelUpRank">Novice</div>
        <div class="level-up__hint">Click anywhere to continue</div>
      </div>
    </div>
  </div>

 <script type="module" src="./js/script.js"></script>
</body>
</html>
